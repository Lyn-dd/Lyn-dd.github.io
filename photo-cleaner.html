<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로컬 파일 분류기</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        #drop-zone { border: 3px dashed #bbb; border-radius: 10px; padding: 50px; background: #fff; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        #drop-zone:hover { background-color: #f0f8ff; border-color: #0066cc; }
        #workspace { display: none; }
        #image-container img { max-width: 80%; max-height: 500px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .controls { margin-top: 20px; font-size: 1.2rem; }
        .btn { padding: 10px 20px; font-size: 1rem; cursor: pointer; background-color: #0066cc; color: white; border: none; border-radius: 5px; margin-top: 15px; }
        .btn:hover { background-color: #0055aa; }
    </style>
</head>
<body>

    <h1>웹 이미지 분류기</h1>
    <p>서버 전송 없이 브라우저에서만 작동합니듸.</p>

    <!-- 드래그 앤 드롭 영역 -->
    <div id="drop-zone">이곳에 정리할 이미지 파일들을 드래그 앤 드롭해주세듸.</div>

    <!-- 작업 영역 -->
    <div id="workspace">
        <div id="image-container"></div>
        <div class="controls">
            <p>⌨️ <strong>방향키 왼쪽(←)</strong>: 파일 유지 &nbsp;&nbsp;|&nbsp;&nbsp; <strong>방향키 오른쪽(→)</strong>: 삭제(휴지통) 예정</p>
            <p id="status-text"></p>
        </div>
        <button id="download-btn" class="btn" style="display:none;">배치(.bat) 파일 다운로드</button>
    </div>

    <script>
        let files = [];
        let currentIndex = 0;
        let deleteList = [];

        const dropZone = document.getElementById('drop-zone');
        const workspace = document.getElementById('workspace');
        const imageContainer = document.getElementById('image-container');
        const downloadBtn = document.getElementById('download-btn');
        const statusText = document.getElementById('status-text');

        // 드래그 앤 드롭 이벤트 처리
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#0066cc'; });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.style.borderColor = '#bbb'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            if (files.length > 0) {
                dropZone.style.display = 'none';
                workspace.style.display = 'block';
                showImage(currentIndex);
            } else {
                alert('이미지 파일만 인식됩니듸.');
            }
        });

        // 이미지 화면에 표시
        function showImage(index) {
            if (index >= files.length) {
                imageContainer.innerHTML = '<h3>분류가 완료되었습니듸! 아래 버튼을 눌러 스크립트를 다운로드하세듸.</h3>';
                statusText.innerText = `총 ${files.length}개 중 ${deleteList.length}개 삭제 예정`;
                downloadBtn.style.display = 'inline-block';
                return;
            }
            const file = files[index];
            const url = URL.createObjectURL(file);
            imageContainer.innerHTML = `<img src="${url}" alt="${file.name}">`;
            statusText.innerText = `현재 진행: ${index + 1} / ${files.length} (${file.name})`;
        }

        // 방향키 이벤트 처리
        document.addEventListener('keydown', (e) => {
            if (currentIndex >= files.length) return;
            
            if (e.key === 'ArrowLeft') {
                currentIndex++;
                showImage(currentIndex);
            } else if (e.key === 'ArrowRight') {
                deleteList.push(files[currentIndex].name);
                currentIndex++;
                showImage(currentIndex);
            }
        });

        // 배치 파일 생성 및 다운로드 로직
        downloadBtn.addEventListener('click', () => {
            if (deleteList.length === 0) {
                alert('휴지통으로 보낼 파일이 없습니듸.');
                return;
            }
            
            const fileNames = deleteList.map(name => `"${name}"`).join(" ");
            
            // 한글 깨짐 방지(chcp 65001) 및 휴지통 이동 로직
            const batContent = `@echo off
chcp 65001 >nul
set files=${fileNames}
for %%f in (%files%) do (
    powershell -Command "Add-Type -AssemblyName Microsoft.VisualBasic; [Microsoft.VisualBasic.FileIO.FileSystem]::DeleteFile('%%~f', 'OnlyErrorDialogs', 'SendToRecycleBin')"
)
echo.
echo 선택한 파일들이 휴지통으로 이동되었습니듸.
pause`;

            const blob = new Blob([batContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cleanup.bat';
            a.click();
        });
    </script>
</body>
</html>
