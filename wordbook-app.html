<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Book</title>
</head>
<body>
  <main id="flashcard-container">
    <button type="button" id="card">
      <span id="card-content">준비 중...</span>
    </button>

    <p id="card-index"></p>

    <div>
      <button type="button" id="word-prev">이전</button>
      <button type="button" id="word-next">뜻 보기</button>
      <button type="button" id="word-shuffle">섞기</button>
    </div>
  </main>

  <script id="word-data" type="application/json">
  {{ site.data.words | jsonify }}
  </script>

<script>
(() => {
  function initWordBook() {
    const dataEl = document.getElementById('word-data');
    const card = document.getElementById('card');
    const cardContent = document.getElementById('card-content');
    const indexText = document.getElementById('card-index');
    const prevBtn = document.getElementById('word-prev');
    const nextBtn = document.getElementById('word-next');
    const shuffleBtn = document.getElementById('word-shuffle');

    if (!card || !cardContent || !indexText) {
      return;
    }

    let words = [];

    try {
      const parsed = JSON.parse(dataEl?.textContent || '[]');
      words = Array.isArray(parsed) ? parsed : [];
    } catch (error) {
      console.error('Word data parse error:', error);
    }

    let currentIndex = 0;
    let isFront = true;

    function getMeaning(item) {
      return (
        item.definition ||
        item.meaning ||
        item.korean ||
        item.ko ||
        '뜻이 등록되어 있지 않습니다.'
      );
    }

    function showCard() {
      if (!words.length) {
        cardContent.textContent = '_data/words.yml 파일을 확인해 주세요.';
        indexText.textContent = '';
        return;
      }

      const item = words[currentIndex] || {};

      cardContent.textContent = isFront
        ? item.word || ''
        : getMeaning(item);

      indexText.textContent = `${currentIndex + 1} / ${words.length}`;

      if (nextBtn) {
        nextBtn.textContent = isFront ? '뜻 보기' : '다음';
      }
    }

    function flipCard() {
      if (!words.length) return;

      isFront = !isFront;
      showCard();
    }

    function goPrevious() {
      if (!words.length) return;

      currentIndex = (currentIndex - 1 + words.length) % words.length;
      isFront = true;
      showCard();
    }

    function goNext() {
      if (!words.length) return;

      if (isFront) {
        isFront = false;
        showCard();
        return;
      }

      currentIndex = (currentIndex + 1) % words.length;
      isFront = true;
      showCard();
    }

    function shuffleWords() {
      if (!words.length) return;

      for (let i = words.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [words[i], words[j]] = [words[j], words[i]];
      }

      currentIndex = 0;
      isFront = true;
      showCard();
    }

    card.addEventListener('click', flipCard);
    prevBtn?.addEventListener('click', goPrevious);
    nextBtn?.addEventListener('click', goNext);
    shuffleBtn?.addEventListener('click', shuffleWords);

    document.addEventListener('keydown', (event) => {
      const activeTag = document.activeElement?.tagName?.toLowerCase();

      if (['input', 'textarea', 'select'].includes(activeTag)) {
        return;
      }

      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        goPrevious();
      }

      if (event.key === 'ArrowRight') {
        event.preventDefault();
        goNext();
      }
    });

    showCard();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initWordBook, { once: true });
  } else {
    initWordBook();
  }
})();
</script>

  
</body>
</html>
